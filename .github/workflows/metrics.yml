name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: .github/output/metrics.classic.svg
          user: anohjr
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories, metadata
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_topics: yes
          plugin_followup: yes
          repositories_affiliations: owner, collaborator, organization_member

  wakatime-metrics:
    needs: github-metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: .github/output/metrics.plugin.wakatime.svg
          user: anohjr
          token: NOT_NEEDED
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_languages_other: yes
          plugin_wakatime_repositories_visibility: public
          plugin_wakatime_sections: time, languages, languages-graphs, editors, os
